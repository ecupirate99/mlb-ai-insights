<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB AI Insights | Production Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in CDN environment
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [showDemo, setShowDemo] = useState(false);
            const [demoTab, setDemoTab] = useState('games');
            const [loading, setLoading] = useState(false);
            const [apiResult, setApiResult] = useState(null);
            const [inputValue, setInputValue] = useState('');

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const fetchDemoData = async (type, payload = {}) => {
                setLoading(true);
                setApiResult(null);
                try {
                    // Note: These paths assume the relative API structure on your Vercel deployment
                    const endpoint = type === 'games' ? '/api/games/today' : `/api/insights/${type}`;
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    setApiResult(data);
                } catch (error) {
                    setApiResult({ 
                        error: "Connection Refused", 
                        message: "The API is currently available at mlb-ai-insights.vercel.app. Ensure CORS is handled if testing locally.",
                        tip: "Try visiting the live URL to see production responses."
                    });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'glass-effect py-3 border-b border-slate-800' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-gradient-to-br from-blue-600 to-indigo-600 p-2 rounded-lg">
                                    <Icon name="activity" className="text-white" size={20} />
                                </div>
                                <span className="text-xl font-bold tracking-tight">
                                    MLB AI <span className="text-blue-500">INSIGHTS</span>
                                </span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                                <a href="#features" className="hover:text-blue-400">Features</a>
                                <button 
                                    onClick={() => setShowDemo(true)}
                                    className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full transition-all active:scale-95"
                                >
                                    Live API Tester
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="relative pt-32 pb-20 md:pt-48 md:pb-32">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold uppercase tracking-widest mb-6">
                                <Icon name="zap" size={14} /> Gemini 2.5 Pro Live
                            </div>
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 leading-tight">
                                Real-Time Baseball <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                                    Intelligence Engine
                                </span>
                            </h1>
                            <p className="text-lg text-slate-400 max-w-2xl mx-auto mb-10">
                                A production-ready API blending real MLB StatsAPI data with advanced AI analysis. 
                                Built for creators, bettors, and developers.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onClick={() => setShowDemo(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-2">
                                    Get Started <Icon name="chevron-right" size={20} />
                                </button>
                                <button onClick={() => setShowDemo(true)} className="bg-slate-900 hover:bg-slate-800 text-slate-200 border border-slate-700 px-8 py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-2">
                                    <Icon name="play" size={18} /> Watch Demo
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Features */}
                    <section id="features" className="py-20 px-6">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                            <div className="p-8 rounded-3xl bg-slate-900/50 border border-slate-800">
                                <Icon name="database" className="mx-auto mb-4 text-blue-500" />
                                <h3 className="text-xl font-bold mb-2">Real MLB StatsAPI</h3>
                                <p className="text-slate-400 text-sm">Direct integration with official MLB data sources for real-time accuracy.</p>
                            </div>
                            <div className="p-8 rounded-3xl bg-slate-900/50 border border-slate-800">
                                <Icon name="brain-circuit" className="mx-auto mb-4 text-indigo-500" />
                                <h3 className="text-xl font-bold mb-2">Gemini Analysis</h3>
                                <p className="text-slate-400 text-sm">AI-interpreted situational data that goes beyond raw spreadsheets.</p>
                            </div>
                            <div className="p-8 rounded-3xl bg-slate-900/50 border border-slate-800">
                                <Icon name="zap" className="mx-auto mb-4 text-purple-500" />
                                <h3 className="text-xl font-bold mb-2">Vercel Powered</h3>
                                <p className="text-slate-400 text-sm">Scalable serverless functions providing sub-second latency.</p>
                            </div>
                        </div>
                    </section>

                    {/* Demo Modal */}
                    {showDemo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-effect">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-4xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in duration-200">
                                <div className="p-6 border-b border-slate-800 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <Icon name="cpu" className="text-blue-400" />
                                        <h3 className="font-bold">Interactive API Tester</h3>
                                    </div>
                                    <button onClick={() => setShowDemo(false)} className="text-slate-400 hover:text-white">
                                        <Icon name="x" />
                                    </button>
                                </div>
                                <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                                    <div className="w-full md:w-64 border-r border-slate-800 p-4 space-y-2 bg-slate-950/20">
                                        <button onClick={() => {setDemoTab('games'); setApiResult(null);}} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 ${demoTab === 'games' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                            <Icon name="calendar" size={18} /> Today's Games
                                        </button>
                                        <button onClick={() => {setDemoTab('team'); setApiResult(null);}} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 ${demoTab === 'team' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                            <Icon name="users" size={18} /> Team Insights
                                        </button>
                                        <button onClick={() => {setDemoTab('player'); setApiResult(null);}} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 ${demoTab === 'player' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                            <Icon name="target" size={18} /> Player Insights
                                        </button>
                                    </div>
                                    <div className="flex-1 p-6 overflow-y-auto">
                                        <div className="mb-6">
                                            {demoTab !== 'games' && (
                                                <input 
                                                    type="text" 
                                                    value={inputValue}
                                                    onChange={(e) => setInputValue(e.target.value)}
                                                    placeholder={demoTab === 'team' ? "e.g. Mets" : "e.g. Francisco Lindor"}
                                                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 mb-3"
                                                />
                                            )}
                                            <button 
                                                onClick={() => {
                                                    if(demoTab === 'games') fetchDemoData('games');
                                                    else fetchDemoData(demoTab, demoTab === 'team' ? {teamName: inputValue} : {playerName: inputValue});
                                                }}
                                                className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold w-full flex items-center justify-center gap-2"
                                            >
                                                {loading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="search" size={18} />}
                                                {demoTab === 'games' ? "Fetch Games" : "Generate Insights"}
                                            </button>
                                        </div>
                                        <div className="bg-slate-950 rounded-xl p-4 border border-slate-800 font-mono text-xs min-h-[200px]">
                                            {apiResult ? (
                                                <pre className="text-blue-400 whitespace-pre-wrap">{JSON.stringify(apiResult, null, 2)}</pre>
                                            ) : (
                                                <p className="text-slate-600 text-center mt-20 italic">Response JSON will appear here...</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-12 border-t border-slate-900 text-center text-sm text-slate-600">
                        © 2024 MLB AI Insights. Powered by Gemini.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
