<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB AI Insights Tester</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
    input, button { padding: 10px; font-size: 16px; }
    button { background: #0070f3; color: white; border: none; cursor: pointer; margin-top: 5px; }
    button:hover { background: #0051cc; }
    pre { background: #f5f5f5; padding: 15px; overflow-x: auto; }
    .loading { color: #666; }
    .section { margin-bottom: 40px; }
  </style>
</head>
<body>
  <h1>🤖 MLB AI Insights Tester</h1>

  <!-- TEAM INSIGHTS -->
  <div class="section">
    <h2>Team Insights</h2>
    <input
      type="text"
      id="teamName"
      placeholder="Enter team name (e.g., Mets, Yankees, Dodgers)"
      onkeydown="if(event.key==='Enter') getTeamInsights()"
    />
    <button onclick="getTeamInsights()">Get Team Insights</button>
  </div>

  <!-- PLAYER INSIGHTS -->
  <div class="section">
    <h2>Player Insights</h2>
    <input
      type="text"
      id="playerInput"
      placeholder="Enter player name or ID (e.g., Ohtani, 592450)"
      onkeydown="if(event.key==='Enter') getPlayerInsights()"
    />
    <button onclick="getPlayerInsights()">Get Player Insights</button>
  </div>

  <!-- GAME INSIGHTS -->
  <div class="section">
    <h2>Game Insights</h2>
    <input
      type="text"
      id="gameId"
      placeholder="Enter game ID (or use Today’s Games below)"
      onkeydown="if(event.key==='Enter') getGameInsights()"
    />
    <button onclick="getGameInsights()">Get Game Insights</button>
  </div>

  <!-- TODAY'S GAMES -->
  <div class="section">
    <h2>Today's MLB Games</h2>
    <button onclick="loadTodaysGames()">Load Today’s Games</button>
    <div id="gamesList"></div>
  </div>

  <div id="result"></div>

  <script>
    function showLoading() {
      document.getElementById('result').innerHTML = '<p class="loading">Loading...</p>';
    }

    function showResult(data) {
      document.getElementById('result').innerHTML =
        `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

    async function postJSON(endpoint, body) {
      showLoading();
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return res.json();
    }

    async function getTeamInsights() {
      const teamName = document.getElementById('teamName').value.trim();
      if (!teamName) return alert('Enter a team name');
      const data = await postJSON('/api/insights/team', { teamName });
      showResult(data);
    }

    async function getPlayerInsights() {
      const input = document.getElementById('playerInput').value.trim();
      if (!input) return alert('Enter a player name or ID');

      const body = isNaN(input)
        ? { playerName: input }
        : { playerId: Number(input) };

      const data = await postJSON('/api/insights/player', body);
      showResult(data);
    }

    async function getGameInsights(gameIdOverride) {
      const gameId = gameIdOverride || document.getElementById('gameId').value.trim();
      if (!gameId) return alert('Enter a game ID or choose from Today’s Games');

      const data = await postJSON('/api/insights/game', { gameId });
      showResult(data);
    }

    async function loadTodaysGames() {
      const gamesDiv = document.getElementById('gamesList');
      gamesDiv.innerHTML = '<p class="loading">Loading today’s games...</p>';

      const today = new Date().toISOString().split('T')[0];
      const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}`;

      const res = await fetch(url);
      const data = await res.json();

      if (!data.dates || data.dates.length === 0) {
        gamesDiv.innerHTML = '<p>No MLB games today.</p>';
        return;
      }

      const games = data.dates[0].games;

      gamesDiv.innerHTML = games.map(g => `
        <button onclick="getGameInsights('${g.gamePk}')">
          ${g.teams.away.team.name} @ ${g.teams.home.team.name}
        </button>
      `).join('<br><br>');
    }
  </script>
</body>
</html>
